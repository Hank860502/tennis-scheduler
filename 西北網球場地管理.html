<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西北國際網球場地調度儀表板</title>
    <link rel="icon" type="image/x-icon" href="https://northwest-sports.com/assets/sm-logo2-8e0494da68fe896adb688b0ca1a9217875b9e205a0bb73b01af606096d3bcf0f.png">
    
    <!-- Tailwind CSS (純樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 圖示 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* 捲軸美化 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .bg-brand { background-color: #168cf5; }
        .text-brand { color: #168cf5; }
        .border-brand { border-color: #168cf5; }
    </style>
</head>
<body>
    <!-- 頂部 Header -->
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-[98vw] mx-auto mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://northwest-sports.com/assets/logo-463d63dd60adb1ff2bed1cf4337d26db65b22e6c6f8708817adb0c1deb419fcd.png" alt="Logo" class="h-12 w-auto">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">西北網球中心 預約儀表板</h1>
                    <p class="text-sm text-gray-500 font-medium">場地調度與每日配置</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <input type="file" id="csv-upload" accept=".csv" class="hidden" />
                <button onclick="document.getElementById('csv-upload').click()" class="flex items-center gap-2 bg-brand hover:opacity-90 text-white px-5 py-2.5 rounded-lg shadow-sm transition-all text-sm font-bold">
                    <i class="fas fa-upload"></i> 上傳資料 (CSV)
                </button>
            </div>
        </div>

        <div class="max-w-[98vw] mx-auto">
            <!-- 控制項：下拉選單與圖例 -->
            <div class="flex flex-col md:flex-row gap-6 mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                <div class="inline-flex items-center">
                    <label for="date-select" class="font-bold text-gray-700 flex items-center gap-2 pl-2 pr-3">
                        <i class="far fa-calendar-alt text-indigo-600 text-lg"></i> 選擇日期：
                    </label>
                    <select id="date-select" class="bg-gray-50 border border-gray-300 text-gray-900 text-base rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 cursor-pointer font-bold outline-none shadow-inner min-w-[200px]">
                        <!-- 選項由 JS 動態產生 -->
                    </select>
                </div>

                <div class="hidden md:block w-px bg-gray-200"></div>

                <div class="flex items-center gap-4 text-xs font-medium text-gray-600">
                    <span class="font-bold text-gray-800">預約身分：</span>
                    <div class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-sm bg-blue-400"></span>西北課程</div>
                    <div class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-sm bg-purple-400"></span>其他教練</div>
                    <div class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-sm bg-emerald-400"></span>一般民眾</div>
                </div>
            </div>

            <!-- 資料網格容器 -->
            <div id="grid-container" class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                <!-- 表格由 JS 動態產生 -->
            </div>
        </div>
    </div>

    <!-- 彈出視窗容器 -->
    <div id="modal-container"></div>

    <!-- 原生 JavaScript 邏輯區 -->
    <script>
        // 預設 CSV 測試資料
        const defaultCSV = `日期,時間,名稱,學生暱稱,學生ID,手機,付款方式,預約方式,備註,count`;

        // 常數設定
        const COURTS = [
            { id: '1', name: '1號場 (教練)', type: 'coach' },
            { id: '2', name: '2號場 (教練)', type: 'coach' },
            { id: '3', name: '3號場 (教練)', type: 'coach' },
            { id: '4', name: '4號場 (教練)', type: 'coach-blue' }, 
            { id: '5', name: '5號場', type: 'public' },
            { id: '6', name: '6號場', type: 'public' },
            { id: '7', name: '7號場', type: 'public' },
            { id: '8', name: '8號場', type: 'public' },
            { id: '9', name: '9號場', type: 'public' },
            { id: '10', name: '10號場 (教練)', type: 'coach' },
            { id: 'central', name: '中央球場', type: 'public' },
            { id: 'park1', name: '臺中公園1號', type: 'park' }, 
            { id: 'park2', name: '臺中公園2號', type: 'park' }      
        ];

        const HALF_HOURS = Array.from({ length: 32 }, (_, i) => {
            const totalMinutes = 6 * 60 + i * 30;
            const hour = Math.floor(totalMinutes / 60).toString().padStart(2, '0');
            const minute = (totalMinutes % 60).toString().padStart(2, '0');
            return `${hour}:${minute}`;
        });

        // 狀態變數
        let globalRecords = [];
        let globalDates = [];
        let globalSelectedDate = '';

        // 工具函式
        function getCourtStyles(type, isHeader = false) {
            switch (type) {
                case 'coach': 
                    return isHeader ? 'bg-[#002050] text-white' : 'bg-blue-50 hover:bg-blue-100/50 transition';
                case 'coach-blue': 
                    return isHeader ? 'bg-blue-600 text-white' : 'bg-blue-50 hover:bg-blue-100/50 transition';
                case 'public': 
                    return isHeader ? 'bg-green-500 text-white' : 'bg-green-50 hover:bg-green-100/50 transition';
                case 'park': 
                    return isHeader ? 'bg-amber-700 text-white' : 'bg-amber-50 hover:bg-amber-100/50 transition';
                default:
                    return isHeader ? 'bg-gray-700 text-white' : 'bg-gray-50';
            }
        }

        function getReservationStyle(record) {
            const type = record.originalCourtName || '';
            const user = record.user || '';
            if (type.includes('西北課程') || user.toUpperCase() === 'NW' || user.includes('西北')) {
                return 'bg-blue-100 border border-blue-300 text-blue-800 hover:brightness-95'; 
            }
            if (type.includes('教練')) {
                return 'bg-purple-100 border border-purple-300 text-purple-800 hover:brightness-95'; 
            }
            if (type.includes('一般民眾') || type.includes('一般') || type.includes('民眾')) {
                return 'bg-emerald-100 border border-emerald-300 text-emerald-800 hover:brightness-95'; 
            }
            return 'bg-gray-100 border border-gray-300 text-gray-800 hover:brightness-95'; 
        }

        function parseCourtToId(str) {
            if (!str) return null;
            if (str.includes('公園1') || str.includes('公園一')) return 'park1';
            if (str.includes('公園2') || str.includes('公園二')) return 'park2';
            if (str.includes('中央')) return 'central';
            const numMatch = str.match(/\d+/);
            if (numMatch) return numMatch[0]; 
            return null;
        }

        function timeToMinutes(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + (parseInt(parts[1]) || 0);
        }

        // 初始化日期
        function generateDates() {
            const dates = [];
            const today = new Date(); 
            const daysArr = ['日', '一', '二', '三', '四', '五', '六'];
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const y = d.getFullYear();
                const m = d.getMonth() + 1;
                const date = d.getDate();
                dates.push({ dateStr: `${y}年${m}月${date}日`, dayOfWeek: daysArr[d.getDay()] });
            }
            globalDates = dates;
            if (dates.length > 0) globalSelectedDate = dates[0].dateStr;
        }

        // 解析 CSV 邏輯
        function parseCSVData(csvText) {
            try {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                const headers = lines[0].split(',').map(h => h.trim());
                globalRecords = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((header, index) => {
                        let val = values[index] || '';
                        obj[header] = val.replace(/^"|"$/g, '').trim();
                    });

                    if (obj['日期'] && obj['時間'] && obj['名稱']) {
                        const times = obj['時間'].split('-');
                        const start = times[0].trim();
                        const end = times[1] ? times[1].trim() : start;
                        const courtId = parseCourtToId(obj['名稱']);
                        
                        let userName = obj['學生暱稱'] || '';
                        if (userName.includes('NorthWest 西北') || userName.includes('Northwest 西北')) {
                            userName = userName.replace(/NorthWest 西北|Northwest 西北/g, 'NW');
                        }
                        
                        if (courtId) {
                            globalRecords.push({
                                uid: Math.random().toString(36).substr(2, 9), // 產生隨機 ID 綁定事件
                                date: obj['日期'],
                                startTime: start,
                                endTime: end,
                                courtId: courtId,
                                originalCourtName: obj['名稱'],
                                user: userName,
                                note: obj['備註'] || '',
                                phone: obj['手機'] || ''
                            });
                        }
                    }
                }
            } catch (e) {
                console.error("CSV Parsing Error", e);
                alert("解析 CSV 時發生錯誤");
            }
        }

        // 渲染日期下拉選單
        function renderControls() {
            const select = document.getElementById('date-select');
            select.innerHTML = '';
            globalDates.forEach(dateObj => {
                const option = document.createElement('option');
                option.value = dateObj.dateStr;
                option.textContent = `${dateObj.dateStr} (${dateObj.dayOfWeek})`;
                if (dateObj.dateStr === globalSelectedDate) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        // 渲染核心表格網格
        function renderGrid() {
            const container = document.getElementById('grid-container');
            
            // 建立查找表加速效能
            const currentDayRecords = globalRecords.filter(r => r.date === globalSelectedDate);
            const recordsMap = {};
            COURTS.forEach(c => recordsMap[c.id] = {});
            currentDayRecords.forEach(r => {
                if (!recordsMap[r.courtId][r.startTime]) recordsMap[r.courtId][r.startTime] = [];
                recordsMap[r.courtId][r.startTime].push(r);
            });

            let html = `
                <div class="overflow-auto max-h-[75vh] relative custom-scrollbar">
                    <table class="w-full table-fixed border-collapse text-sm">
                        <thead>
                            <tr>
                                <th class="sticky top-0 left-0 z-30 bg-gray-100 p-2 w-20 text-center font-bold text-gray-700 shadow-[1px_1px_0_0_#e2e8f0]">
                                    <i class="far fa-clock"></i> 時間
                                </th>`;
            
            COURTS.forEach(court => {
                html += `<th class="sticky top-0 z-20 p-2 min-w-[160px] max-w-[160px] w-[160px] text-center font-semibold text-sm ${getCourtStyles(court.type, true)} border-b border-r border-gray-200/20">${court.name}</th>`;
            });
            html += `</tr></thead><tbody>`;

            const skipCells = {};
            COURTS.forEach(c => skipCells[c.id] = 0);

            HALF_HOURS.forEach((slot, rowIndex) => {
                const isHourStart = slot.endsWith(':00');
                html += `<tr class="hover:bg-gray-50/50">`;
                
                // 時間列
                html += `<td class="sticky left-0 z-10 bg-white p-2 text-center text-xs font-bold text-gray-600 shadow-[1px_0_0_0_#e2e8f0] w-20 border-r border-gray-200 ${isHourStart ? 'border-t border-t-gray-300 bg-gray-50' : 'border-t border-t-gray-100'}">${slot}</td>`;

                COURTS.forEach(court => {
                    // 如果此格被先前的長時段預約覆蓋
                    if (skipCells[court.id] > 0) {
                        skipCells[court.id]--;
                        return;
                    }

                    const records = recordsMap[court.id][slot] || [];
                    
                    if (records.length > 0) {
                        const startMins = timeToMinutes(slot);
                        let maxSpan = 1;
                        records.forEach(r => {
                            const endMins = timeToMinutes(r.endTime);
                            const span = Math.max(1, Math.ceil((endMins - startMins) / 30));
                            if (span > maxSpan) maxSpan = span;
                        });

                        skipCells[court.id] = maxSpan - 1;

                        html += `<td rowspan="${maxSpan}" class="p-0.5 align-top relative min-w-[160px] max-w-[160px] w-[160px] border-r border-gray-200 ${isHourStart ? 'border-t border-t-gray-300' : 'border-t border-t-gray-100'}" style="height: 1px;">
                                    <div class="flex flex-row gap-0.5 h-full w-full items-start">`;
                        
                        records.forEach(r => {
                            const endMins = timeToMinutes(r.endTime);
                            const span = Math.max(1, Math.ceil((endMins - startMins) / 30));
                            const heightPercent = maxSpan > 0 ? (span / maxSpan) * 100 : 100;
                            
                            html += `
                                <div data-uid="${r.uid}" class="booking-card flex-1 rounded-md p-1.5 flex flex-col justify-center items-center text-center overflow-hidden cursor-pointer shadow-sm transition-all ${getReservationStyle(r)}" style="height: ${heightPercent}%; min-height: 40px;" title="點擊查看詳細資訊">
                                    <div class="font-bold text-[13px] truncate w-full pointer-events-none">${r.user}</div>
                                    ${r.note}
                                </div>`;
                        });
                        html += `</div></td>`;
                    } else {
                        // 空白格
                        html += `<td class="p-1 min-w-[160px] max-w-[160px] w-[160px] text-center border-r border-gray-200 ${getCourtStyles(court.type, false)} ${isHourStart ? 'border-t border-t-gray-300' : 'border-t border-t-gray-100'}"></td>`;
                    }
                });
                html += `</tr>`;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // 開啟詳細資訊彈出視窗
        function openModal(uid) {
            const record = globalRecords.find(r => r.uid === uid);
            if (!record) return;

            const modalStyle = getReservationStyle(record).replace(/border|hover:\w+-\d+|hover:\w+-\w+/g, '');
            const hasPhone = record.phone && record.phone.trim() !== '';
            const hasNote = record.note && record.note !== 'BLOCKOUT';

            const modalHtml = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" id="modal-overlay">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100" id="modal-content">
                        <div class="p-4 border-b flex justify-between items-center ${modalStyle}">
                            <h3 class="font-bold text-lg text-gray-900 flex items-center gap-2">
                                <i class="fas fa-info-circle opacity-70"></i> 預約詳細資訊
                            </h3>
                            <button id="close-modal-icon" class="text-gray-500 hover:text-gray-800 p-1 transition-colors">
                                <i class="fas fa-times text-lg pointer-events-none"></i>
                            </button>
                        </div>
                        
                        <div class="p-6 space-y-5">
                            <div>
                                <p class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-wider">預約人</p>
                                <p class="text-2xl font-bold text-gray-900 break-words">${record.user}</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-inner">
                                <div>
                                    <p class="text-xs text-gray-500 mb-1 flex items-center gap-1.5"><i class="far fa-calendar-alt text-indigo-500"></i> 日期</p>
                                    <p class="text-sm font-bold text-gray-800">${record.date}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 mb-1 flex items-center gap-1.5"><i class="far fa-clock text-indigo-500"></i> 時間</p>
                                    <p class="text-sm font-bold text-gray-800">${record.startTime} - ${record.endTime}</p>
                                </div>
                            </div>

                            <div>
                                <p class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-wider flex items-center gap-1.5"><i class="fas fa-map-marker-alt text-gray-400"></i> 場地安排</p>
                                <p class="text-base text-gray-800 font-bold bg-gray-100 inline-block px-3 py-1 rounded-lg border border-gray-200">${record.originalCourtName}</p>
                            </div>

                            ${hasPhone ? `
                                <div class="p-4 bg-blue-50/80 rounded-xl border border-blue-200 relative overflow-hidden">
                                    <div class="absolute right-0 top-0 w-16 h-16 bg-blue-500 opacity-5 rounded-bl-full pointer-events-none"></div>
                                    <p class="text-xs text-blue-600 font-bold mb-1.5 flex items-center gap-1.5 uppercase tracking-wider">
                                        <i class="fas fa-phone-alt"></i> 聯絡電話
                                    </p>
                                    <p class="text-lg font-extrabold text-blue-900 break-words">${record.phone}</p>
                                </div>
                            ` : ''}

                            ${hasNote ? `
                                <div>
                                    <p class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-wider flex items-center gap-1.5"><i class="fas fa-align-left text-gray-400"></i> 備註事項</p>
                                    <p class="text-sm text-gray-700 bg-gray-50 border border-gray-200 p-3 rounded-lg break-words leading-relaxed">${record.note}</p>
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-4 border-t bg-gray-50 flex justify-end">
                            <button id="close-modal-btn" class="w-full py-2.5 bg-gray-800 text-white rounded-lg font-bold hover:bg-gray-700 transition shadow-md">關閉</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').innerHTML = modalHtml;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        // --- 事件綁定 ---
        
        // CSV 檔案上傳
        document.getElementById('csv-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    parseCSVData(evt.target.result);
                    renderGrid(); // 重新繪製表格
                };
                reader.readAsText(file);
            }
        });

        // 日期下拉選單變更
        document.getElementById('date-select').addEventListener('change', (e) => {
            globalSelectedDate = e.target.value;
            renderGrid();
        });

        // 全局點擊事件監聽 (Event Delegation)
        document.addEventListener('click', (e) => {
            // 點擊預約卡片
            const card = e.target.closest('.booking-card');
            if (card) {
                openModal(card.getAttribute('data-uid'));
            }
            // 關閉 Modal
            if (e.target.closest('#close-modal-icon') || e.target.closest('#close-modal-btn') || e.target.id === 'modal-overlay') {
                closeModal();
            }
        });

        // --- 初始化執行 ---
        window.onload = () => {
            generateDates();
            parseCSVData(defaultCSV);
            renderControls();
            renderGrid();
        };

    </script>
</body>
</html>
